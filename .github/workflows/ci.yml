name: CI

# 触发：推送到 main / dev-* 分支，以及所有 PR
on:
  push:
    branches: [main, 'dev-**']
  pull_request:

# 同一分支的新推送会取消上一次未跑完的运行，省 Actions 额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 最小权限：CI 只需读代码
permissions:
  contents: read

jobs:
  backend:
    name: backend · lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # 单元测试离线运行：不连 DB、不调真 LLM。dummy LLM env 仅用于模块构造兜底。
      - name: unit tests
        run: npm test
        env:
          LLM_API_KEY: dummy-key-for-ci
          LLM_BASE_URL: https://example.invalid/v1

  frontend:
    name: frontend · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
